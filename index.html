<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatSave App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #3390ec; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>EatSave</h2>
    <div class="card">
        <h3>🧊 Мой холодильник</h3>
        <input type="text" id="productInput" placeholder="Название продукта...">
        <button onclick="addProduct()">Добавить продукт</button>
        <ul id="productList"></ul>
    </div>

    <script>
        // Функция загрузки продуктов при открытии
        document.addEventListener('DOMContentLoaded', loadProducts);

        function addProduct() {
            let input = document.getElementById('productInput');
            let list = document.getElementById('productList');
            if (input.value === "") return;

            let li = document.createElement('li');
            li.textContent = input.value;
            list.appendChild(li);

            // Сохраняем в память
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push(input.value);
            localStorage.setItem('products', JSON.stringify(products));

            input.value = "";
        }

        function loadProducts() {
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            let list = document.getElementById('productList');
            products.forEach(p => {
                let li = document.createElement('li');
                li.textContent = p;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
