<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatSave UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: var(--bg); margin: 0; }
        .header { text-align: center; margin-bottom: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #2d3436; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px; background: #fdfdfd; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 5px; }
        .recipe-btn { background: #0984e3; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header"><h2>EatSave</h2></div>
    <div class="card">
        <h3>🧊 Холодильник</h3>
        <input type="text" id="productInput" placeholder="Добавить продукт...">
        <button onclick="addProduct()">Добавить</button>
        <ul id="productList"></ul>
        <button class="recipe-btn" onclick="getRecipe()">Что приготовить?</button>
    </div>
    <div id="recipeResult" class="card" style="display:none;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);
        function addProduct() {
            let input = document.getElementById('productInput');
            if (input.value === "") return;
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push(input.value);
            localStorage.setItem('products', JSON.stringify(products));
            location.reload(); 
        }
        function loadProducts() {
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            let list = document.getElementById('productList');
            products.forEach((p, index) => {
                let li = document.createElement('li');
                li.innerHTML = `<span>${p}</span> <small style="color:#ccc;">✖</small>`;
                li.onclick = () => removeProduct(index);
                list.appendChild(li);
            });
        }
        function removeProduct(index) {
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            products.splice(index, 1);
            localStorage.setItem('products', JSON.stringify(products));
            location.reload();
        }
        function getRecipe() {
            let res = document.getElementById('recipeResult');
            res.style.display = 'block';
            res.innerHTML = "<h3>🍳 Идея рецепта</h3><p>На основе ваших продуктов нейросеть рекомендует: <b>Рагу из овощей и мяса</b>.</p>";
        }
    </script>
</body>
</html>
