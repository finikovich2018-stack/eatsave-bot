<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatSave UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: var(--bg); margin: 0; }
        .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; color: #2d3436; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        .balance-box { font-size: 24px; font-weight: bold; color: var(--primary); text-align: center; margin: 10px 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 12px; background: #fdfdfd; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; border-radius: 8px; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>💰 Финансы</h3>
        <div class="balance-box" id="balanceDisplay">0 ₽</div>
        <input type="number" id="priceInput" placeholder="Сумма покупки (₽)...">
        <button onclick="addExpense()">Записать расход</button>
    </div>

    <div class="card">
        <h3>🧊 Холодильник</h3>
        <input type="text" id="productInput" placeholder="Продукт...">
        <button onclick="addProduct()">Добавить продукт</button>
        <ul id="productList"></ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', updateUI);

        function addExpense() {
            let price = parseInt(document.getElementById('priceInput').value);
            if (isNaN(price)) return;
            let total = parseInt(localStorage.getItem('balance') || 0) + price;
            localStorage.setItem('balance', total);
            location.reload();
        }

        function addProduct() {
            let input = document.getElementById('productInput');
            if (input.value === "") return;
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push(input.value);
            localStorage.setItem('products', JSON.stringify(products));
            location.reload(); 
        }

        function updateUI() {
            document.getElementById('balanceDisplay').innerText = (localStorage.getItem('balance') || 0) + ' ₽';
            
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            let list = document.getElementById('productList');
            products.forEach((p, index) => {
                let li = document.createElement('li');
                li.innerHTML = `<span>${p}</span> <small style="color:#ccc;">✖</small>`;
                li.onclick = () => {
                    products.splice(index, 1);
                    localStorage.setItem('products', JSON.stringify(products));
                    location.reload();
                };
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
