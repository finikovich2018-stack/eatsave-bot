<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EatSave App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #3390ec; color: white; cursor: pointer; margin-top: 5px; }
        .recipe-btn { background: #28a745; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>EatSave</h2>
    <div class="card">
        <h3>🧊 Мой холодильник</h3>
        <input type="text" id="productInput" placeholder="Название продукта...">
        <button onclick="addProduct()">Добавить продукт</button>
        <ul id="productList"></ul>
        <button class="recipe-btn" onclick="getRecipe()">Что приготовить?</button>
    </div>
    <div id="recipeResult" class="card" style="display:none;"></div>

    <script>
        document.addEventListener('DOMContentLoaded', loadProducts);

        function addProduct() {
            let input = document.getElementById('productInput');
            let val = input.value;
            if (val === "") return;
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            products.push(val);
            localStorage.setItem('products', JSON.stringify(products));
            location.reload(); 
        }

        function loadProducts() {
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            let list = document.getElementById('productList');
            products.forEach(p => {
                let li = document.createElement('li');
                li.textContent = p;
                list.appendChild(li);
            });
        }

        function getRecipe() {
            let products = JSON.parse(localStorage.getItem('products') || '[]');
            let res = document.getElementById('recipeResult');
            res.style.display = 'block';
            if (products.length >= 2) {
                res.innerHTML = "<h3>🍳 Рецепт:</h3><p>Из ваших ингредиентов можно приготовить вкусное блюдо! Попробуйте сделать рагу или запеканку.</p>";
            } else {
                res.innerHTML = "<p>Добавьте еще хотя бы один продукт.</p>";
            }
        }
    </script>
</body>
</html>
