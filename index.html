<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>EatSave AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #28a745; --bg: #f8f9fa; }
        body { font-family: sans-serif; padding: 15px; background-color: var(--bg); margin: 0; }
        .card { background: white; padding: 15px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .ai-btn { background: #6c5ce7; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; }
        #aiResult { color: #2d3436; font-style: italic; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🧊 Что приготовить из этого?</h3>
        <ul id="productList" style="margin: 10px 0;"></ul>
        <button class="ai-btn" onclick="generateRecipe()">🧠 Спросить у ИИ</button>
    </div>
    <div class="card" id="aiResult" style="display:none;"></div>

    <script>
        // Загружаем продукты из памяти
        let products = JSON.parse(localStorage.getItem('products') || '[]');
        let list = document.getElementById('productList');
        products.forEach(p => {
            let li = document.createElement('li');
            li.textContent = p;
            list.appendChild(li);
        });

        function generateRecipe() {
            let res = document.getElementById('aiResult');
            res.style.display = 'block';
            
            if (products.length < 2) {
                res.innerHTML = "💡 Добавьте хотя бы 2-3 ингредиента, чтобы ИИ мог придумать рецепт.";
                return;
            }

            // Имитация "умного" анализа
            let recipe = "На основе: " + products.join(', ') + ". ";
            recipe += "ИИ предлагает: Приготовьте **«Ассорти-сковородку»**. Обжарьте ваши ингредиенты с добавлением специй, добавьте немного сметаны для соуса — получится сытное и быстрое блюдо!";
            
            res.innerHTML = "<h3>🍳 Рецепт от EatSave AI</h3><p>" + recipe + "</p>";
        }
    </script>
</body>
</html>
